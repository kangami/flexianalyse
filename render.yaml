# Render Blueprint — FlexiAnalyse backend
# Deploys: PostgreSQL (pgvector), Key Value (Redis), Flask API, Celery worker.
#
# pgvector is enabled by migration 9139bf022744 (CREATE EXTENSION IF NOT EXISTS
# vector), so no manual step is needed on a fresh database.
#
# Adjust `region` and `plan` values to your account/needs before applying.

databases:
  - name: flexianalyse-db
    plan: basic-256mb          # bump to basic-1gb+ for real workloads
    postgresMajorVersion: "16"
    region: oregon

services:
  # ── Redis / Key Value (Celery broker + result backend) ──────────────────
  - type: keyvalue
    name: flexianalyse-redis
    plan: starter
    region: oregon
    ipAllowList: []            # empty = internal connections only

  # ── Flask API (web) ─────────────────────────────────────────────────────
  - type: web
    name: flexianalyse-api
    runtime: python
    region: oregon
    plan: standard             # docling/onnxruntime/faiss are memory-heavy — do NOT use free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    preDeployCommand: flask --app "main:create_app" db upgrade   # runs Alembic migrations on every deploy
    startCommand: gunicorn --workers 2 --timeout 120 --bind 0.0.0.0:$PORT "main:create_app()"
    envVars:
      # Database (auto-filled from flexianalyse-db)
      - key: PG_HOST
        fromDatabase: { name: flexianalyse-db, property: host }
      - key: PG_PORT
        fromDatabase: { name: flexianalyse-db, property: port }
      - key: PG_DATABASE
        fromDatabase: { name: flexianalyse-db, property: database }
      - key: PG_USER
        fromDatabase: { name: flexianalyse-db, property: user }
      - key: PG_PASSWORD
        fromDatabase: { name: flexianalyse-db, property: password }
      # Redis (auto-filled from flexianalyse-redis)
      - key: REDIS_URL
        fromService: { type: keyvalue, name: flexianalyse-redis, property: connectionString }
      # SQL MCP server — internal address (host:port), used by Text-to-SQL
      - key: SQL_MCP_URL
        fromService: { type: pserv, name: flexianalyse-mcp-sql, property: hostport }
      # Dial-home agent gateway (on-prem/local databases)
      - key: AGENT_GATEWAY_URL                 # internal API→gateway /rpc
        fromService: { type: web, name: flexianalyse-gateway, property: hostport }
      - key: AGENT_GATEWAY_PUBLIC_URL          # wss URL agents dial into — set after
        sync: false                            #   the gateway's first deploy
      - key: AGENT_IMAGE                        # published agent image for the run command
        sync: false
      - fromGroup: flexianalyse-agent
      # Shared config/secrets
      - fromGroup: flexianalyse-shared

  # ── Celery worker (document ingestion) ──────────────────────────────────
  - type: worker
    name: flexianalyse-worker
    runtime: python
    region: oregon
    plan: standard
    rootDir: backend
    # Worker also installs the heavy ML/ingestion deps (docling/onnx/faiss) on
    # top of the base. The API build stays light (it doesn't import them).
    buildCommand: pip install -r requirements.txt -r requirements-ml.txt
    startCommand: celery -A celery_app worker --loglevel=info --concurrency=2
    envVars:
      - key: PG_HOST
        fromDatabase: { name: flexianalyse-db, property: host }
      - key: PG_PORT
        fromDatabase: { name: flexianalyse-db, property: port }
      - key: PG_DATABASE
        fromDatabase: { name: flexianalyse-db, property: database }
      - key: PG_USER
        fromDatabase: { name: flexianalyse-db, property: user }
      - key: PG_PASSWORD
        fromDatabase: { name: flexianalyse-db, property: password }
      - key: REDIS_URL
        fromService: { type: keyvalue, name: flexianalyse-redis, property: connectionString }
      # SQL MCP server — internal address (host:port), used by SQL ingestion
      - key: SQL_MCP_URL
        fromService: { type: pserv, name: flexianalyse-mcp-sql, property: hostport }
      # Agent gateway — the worker's schema crawl reaches local DBs through it
      - key: AGENT_GATEWAY_URL
        fromService: { type: web, name: flexianalyse-gateway, property: hostport }
      - fromGroup: flexianalyse-agent
      - fromGroup: flexianalyse-shared

  # ── SQL MCP server (private Docker service) ──────────────────────────────
  # Text-to-SQL (API) and SQL ingestion (worker) call this to reach customer
  # databases. Image built from backend/ai/mcp/servers/sql-server. Private = no
  # public URL; reachable internally as flexianalyse-mcp-sql:<port>. It executes
  # SQL, so it must NOT be public.
  - type: pserv
    name: flexianalyse-mcp-sql
    runtime: docker
    region: oregon
    plan: starter
    rootDir: backend/ai/mcp/servers/sql-server
    dockerfilePath: ./Dockerfile
    dockerContext: .

  # ── Agent gateway (dial-home, PUBLIC) ────────────────────────────────────
  # Holds the WebSocket connections from customers' on-prem agents and forwards
  # tool calls (POST /rpc) from the API/worker. PUBLIC on purpose: agents dial in
  # over WSS from their own networks. /rpc is protected by AGENT_GATEWAY_SECRET;
  # /agent (WS) is authenticated by the signed pairing token.
  - type: web
    name: flexianalyse-gateway
    runtime: docker
    region: oregon
    plan: starter
    rootDir: backend/ai/mcp/servers/agent-gateway
    dockerfilePath: ./Dockerfile
    dockerContext: .
    envVars:
      - fromGroup: flexianalyse-agent

# ── Shared env vars (same values injected into API + worker) ───────────────
# Values marked `sync: false` are NOT stored in git — Render prompts you for
# them in the dashboard on first apply.
envVarGroups:
  - name: flexianalyse-shared
    envVars:
      - key: EMBEDDING_DIMENSION
        value: "1536"
      - key: PYTHON_VERSION
        value: "3.12.7"
      - key: FLASK_APP
        value: main:create_app

      - key: JWT_SECRET
        generateValue: true          # generated once, shared by both services
      # Fernet key encrypting connector credentials in the DB.
      # Must be a valid Fernet key (44-char url-safe base64) — generate with:
      #   python -c "from cryptography.fernet import Fernet; print(Fernet.generate_key().decode())"
      # NEVER rotate it once connectors exist: stored credentials become undecryptable.
      - key: ENCRYPTION_KEY
        sync: false
      - key: RESEND_FROM_EMAIL
        value: FlexiAnalyse <contact@flexianalyse.com>
      - key: LEAD_NOTIFICATION_EMAIL
        value: contact@flexianalyse.com
      - key: OPENAI_API_KEY
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: FRONTEND_URL           # your Vercel URL, e.g. https://flexianalyse.vercel.app
        sync: false

  # Secrets shared by the API, worker and gateway for the dial-home agent.
  # Generated once and identical across the three services (JWT signing + /rpc auth).
  - name: flexianalyse-agent
    envVars:
      - key: AGENT_TOKEN_SECRET     # signs/verifies agent pairing tokens (JWT HS256)
        generateValue: true
      - key: AGENT_GATEWAY_SECRET   # protects the gateway /rpc endpoint
        generateValue: true
